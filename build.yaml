targets:
  $default:
    builders:
      riverpod_generator:
        generate_for:
          include:
            - lib/features/**
            - lib/core/**
      isar_community_generator:
        generate_for:
          include:
            - lib/core/database/entities/**
      freezed:freezed:
        generate_for:
          include:
            - lib/features/**
      json_serializable:
        options:
          explicit_to_json: true
          field_rename: snake
        generate_for:
          include:
            - lib/features/**
