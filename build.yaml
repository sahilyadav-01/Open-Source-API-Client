targets:
  $default:
    builders:
      riverpod_generator:
        generate_for:
          include:
            - lib/features/**/presentation/*.dart
            - lib/features/**/data/*.dart
            - lib/core/router/*.dart
            - lib/core/providers/*.dart
            - lib/core/theme/*.dart
      isar_community_generator:
        generate_for:
          include:
            - lib/core/database/entities/*.dart
      freezed:freezed:
        generate_for:
          include:
            - lib/features/**
      json_serializable:
        options:
          explicit_to_json: true
          field_rename: snake
        generate_for:
          include:
            - lib/features/**
